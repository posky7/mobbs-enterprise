<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#5b4fcf">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Cheshire">
    <title>Cheshire & Co — Booth Inventory</title>
    <style>
        :root {
            --bg: #f5f2ee;
            --surface: #ffffff;
            --accent: #5b4fcf;
            --text: #1a1612;
            --text2: #5a5248;
            --text3: #9a9080;
            --border: #d8d0c6;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background:var(--bg);
            color:var(--text);
            text-align:center;
            padding:40px 20px;
            min-height:100vh;
            padding-top: max(40px, env(safe-area-inset-top));
            padding-bottom: max(40px, env(safe-area-inset-bottom));
        }
        .logo {
            font-size:2.4rem;
            font-weight:700;
            margin-bottom:8px;
            color:var(--accent);
        }
        .tagline {
            font-size:1.15rem;
            margin-bottom:50px;
            color:var(--text2);
        }
        .hub-card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:16px;
            padding:32px 24px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            max-width:360px;
            margin:0 auto 30px;
        }
        .btn {
            display:block;
            background:var(--accent);
            color:#fff;
            border:none;
            padding:18px 20px;
            font-size:1.18rem;
            border-radius:12px;
            margin:16px 0;
            width:100%;
            text-decoration:none;
            font-weight:600;
        }
        .btn:active {
            background:#4a3fb8;
            transform:scale(0.97);
        }
        .info {
            font-size:0.9rem;
            color:var(--text3);
            margin-top:40px;
        }
    </style>
</head>
<body>
    <div class="logo">Cheshire & Co</div>
    <div class="tagline">Craft Booth Inventory Manager</div>

    <div class="hub-card">
        <a href="inventory.html" class="btn">📦 Inventory</a>
        <a href="finance.html" class="btn">💰 Finance Hub</a>
        <a href="hunt.html" class="btn">🔎 The HUNT</a>
        <a href="settings.html" class="btn">⚙️ Settings</a>
    </div>

    <div class="info">
        All data saved automatically with Netlify Blobs<br>
        <small>Add to Home Screen for best experience</small>
    </div>

    <script>
        const blobHelpers = {
            async getBlob(key) {
                try {
                    const res = await fetch(`/.netlify/blobs/${key}`);
                    if (!res.ok) return null;
                    return await res.json();
                } catch(e) { console.error(e); return null; }
            },
            async setBlob(key, data) {
                try {
                    await fetch(`/.netlify/blobs/${key}`, {
                        method: 'PUT',
                        body: JSON.stringify(data),
                        headers: { 'Content-Type': 'application/json' }
                    });
                } catch(e) { console.error(e); }
            }
        };
        console.log("Main hub loaded - colors matched to live site");
    </script>
</body>
</html>
