# Mobbs Enterprise — Netlify config for reliable data persistence via Netlify Blobs
# This forces fresh index.html/JS on every visit → prevents stale code

# Allow function calls to pass through before the SPA catch-all
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

    [build.environment]
  NODE_VERSION = "20"