# Mobbs Enterprise — Netlify configuration

[build]
  publish = "."
  command = "npm run build"   # or leave empty if no build step

[functions]
  node_bundler = "esbuild"    # ← This is the key line for ESM stability

# Clean function URLs
[[redirects]]
  from = "/expenses"
  to = "/.netlify/functions/expenses"
  status = 200

[[redirects]]
  from = "/inventory"
  to = "/.netlify/functions/inventory"
  status = 200

[[redirects]]
  from = "/loans"
  to = "/.netlify/functions/loans"
  status = 200

[[redirects]]
  from = "/reset"
  to = "/.netlify/functions/reset"
  status = 200

[[redirects]]
  from = "/backup-timestamp"
  to = "/.netlify/functions/backup-timestamp"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"