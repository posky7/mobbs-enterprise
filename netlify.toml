# Mobbs Enterprise — Netlify configuration
# Clean redirects for functions + SPA-style fallback for the frontend

# === Clean function URLs (recommended) ===
# Call these instead of /.netlify/functions/...
[[redirects]]
  from = "/expenses"
  to = "/.netlify/functions/expenses"
  status = 200

[[redirects]]
  from = "/inventory"
  to = "/.netlify/functions/inventory"
  status = 200

[[redirects]]
  from = "/loans"
  to = "/.netlify/functions/loans"
  status = 200

[[redirects]]
  from = "/reset"
  to = "/.netlify/functions/reset"
  status = 200

[[redirects]]
  from = "/backup-timestamp"
  to = "/.netlify/functions/backup-timestamp"
  status = 200

# Optional: Support paths with extra segments if needed later
# [[redirects]]
#   from = "/expenses/*"
#   to = "/.netlify/functions/expenses/:splat"
#   status = 200

# === SPA / Frontend fallback ===
# All other routes serve index.html (for client-side routing if you add any)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# === Headers: Prevent caching of index.html (important for updates) ===
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Optional: No-cache for all files (uncomment if you want stricter behavior)
# [[headers]]
#   for = "/*"
#   [headers.values]
#     Cache-Control = "public, max-age=0, must-revalidate"