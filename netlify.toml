# Mobbs Enterprise — Netlify configuration for craft booth app
# No build step needed — pure static site + functions

[build]
  # Leave command empty or use a no-op so it doesn't fail
  command = ""
  publish = "."

# Force esbuild bundler for stable ESM function handling
[functions]
  node_bundler = "esbuild"

# Clean function URLs
[[redirects]]
  from = "/expenses"
  to = "/.netlify/functions/expenses"
  status = 200

[[redirects]]
  from = "/inventory"
  to = "/.netlify/functions/inventory"
  status = 200

[[redirects]]
  from = "/loans"
  to = "/.netlify/functions/loans"
  status = 200

[[redirects]]
  from = "/reset"
  to = "/.netlify/functions/reset"
  status = 200

[[redirects]]
  from = "/backup-timestamp"
  to = "/.netlify/functions/backup-timestamp"
  status = 200

[[redirects]]
  from = "/images"
  to = "/.netlify/functions/images"
  status = 200

# SPA fallback for the frontend
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Prevent caching of index.html
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"